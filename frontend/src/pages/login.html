<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Linketinder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <nav class="navbar">
        <a class="navTitle" href="../../index.html">Linke<span>tinder</span></a>
        <div class="navActions">
            <a href="./login.html">Entrar</a>
            <a href="./cadastro.html">Cadastrar</a>
        </div>
    </nav>

    <section class="formLogin">
        <div class="cardForm">
            <div class="titleForm">
                <h3>Linke<span>tinder</span></h3>
                <p>Entre na sua conta</p>
            </div>
            <div class="toggleTypeUser">
                <button class="active">Candidato</button>
                <button>Empresa</button>
            </div>
            <form action="">
                <div class="inputForm">
                    <label for="email">Email</label>
                    <input
                            type="text"
                            id="email"
                            placeholder="email@exemplo.com"
                    />
                </div>

                <div class="inputForm">
                    <label for="password">Senha</label>
                    <input
                            type="password"
                            id="password"
                            placeholder="********"
                    />
                </div>
                <button>Entrar</button>
            </form>
            <p>Não tem conta? <a href="./cadastro.html">Cadastre-se</a></p>
        </div>
    </section>

    <footer>
        <p>© 2026 Linketinder - Conectando talentos e oportunidades</p>
    </footer>

</body>
</html>
